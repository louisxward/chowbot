services:
  chowbot:
    container_name: chowbot
    restart: unless-stopped
    build: .
    expose:
      - "33002"
    networks:
      - invenchecker
    env_file:
      - .env
    volumes:
      - /opt/data/chowbot:/app/data
      - /var/log/chowbot:/app/log
networks:
  invenchecker:
    external: true
